<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding-top: 20px; font-family: sans-serif; }
    .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); margin-bottom: 20px; }
    .hidden { display: none; }
    .nav-link { font-weight: bold; color: #6c757d; border: none !important; }
    .nav-link.active { border-bottom: 3px solid #0d6efd !important; color: #0d6efd !important; background: transparent !important; }
    .badge-active { background-color: #198754; cursor: pointer; }
    .badge-disabled { background-color: #adb5bd; cursor: pointer; }
    .badge-completed { background-color: #6c757d; }
    .badge-error { background-color: #dc3545; }
  </style>
</head>
<body>
<div class="container" style="max-width: 960px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold text-primary">Discord Reminder Pro</h5>
    <button class="btn btn-sm btn-outline-secondary" onclick="google.script.run.withSuccessHandler(m=>alert(m)).setupSystem()">初期化</button>
  </div>

  <ul class="nav nav-tabs mb-4" id="mainTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-list" onclick="loadReminders()">予約一覧</button></li>
    <li class="nav-item"><button class="nav-link" id="create-tab-btn" data-bs-toggle="tab" data-bs-target="#tab-form">作成・編集</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-templates" onclick="loadTemplates()">テンプレート</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-channels" onclick="loadChannels()">Webhook設定</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-list">
      <div class="card p-3">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light"><tr><th>状態</th><th>送信先 / 内容</th><th>次回予定</th><th>操作</th></tr></thead>
            <tbody id="reminderListBody"><tr><td colspan="4" class="text-center p-5 text-muted">読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="tab-form">
      <div class="card p-4">
        <div class="mb-3 p-3 bg-light border rounded">
          <label class="form-label small fw-bold text-primary">テンプレートから入力</label>
          <div class="input-group">
            <select class="form-select form-select-sm" id="templateSelect"><option value="">選択してください...</option></select>
            <button class="btn btn-sm btn-outline-primary" type="button" onclick="applyTemplate()">適用</button>
          </div>
        </div>
        <h6 class="fw-bold mb-3 text-secondary" id="formTitle">新規リマインダー作成</h6>
        <form id="reminderForm">
          <input type="hidden" id="editRowIndex" value="">
          <div class="mb-3">
            <label class="form-label small fw-bold">送信先チャンネル</label>
            <select class="form-select" id="targetChannel" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">メッセージ</label>
            <textarea class="form-control" id="content" rows="3" required></textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">スケジュール種別</label>
              <select class="form-select" id="scheduleType" onchange="toggleFormMode()">
                <option value="once">単発</option>
                <option value="weekly">毎週</option>
                <option value="monthly">毎月</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold" id="dateTimeLabel">日時設定</label>
              <input type="datetime-local" class="form-control" id="startDateTime" required>
            </div>
          </div>
          <div id="weeklyBox" class="p-3 bg-light rounded mb-3 hidden">
            <label class="form-label small fw-bold d-block mb-2">繰り返し曜日</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="checkbox" class="btn-check day-cb" id="cb1" value="1"><label class="btn btn-outline-primary" for="cb1">月</label>
              <input type="checkbox" class="btn-check day-cb" id="cb2" value="2"><label class="btn btn-outline-primary" for="cb2">火</label>
              <input type="checkbox" class="btn-check day-cb" id="cb3" value="3"><label class="btn btn-outline-primary" for="cb3">水</label>
              <input type="checkbox" class="btn-check day-cb" id="cb4" value="4"><label class="btn btn-outline-primary" for="cb4">木</label>
              <input type="checkbox" class="btn-check day-cb" id="cb5" value="5"><label class="btn btn-outline-primary" for="cb5">金</label>
              <input type="checkbox" class="btn-check day-cb" id="cb6" value="6"><label class="btn btn-outline-primary" for="cb6">土</label>
              <input type="checkbox" class="btn-check day-cb" id="cb0" value="0"><label class="btn btn-outline-primary" for="cb0">日</label>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-primary flex-grow-1" onclick="saveData()">保存する</button>
            <button type="button" class="btn btn-outline-info" onclick="promptSaveTemplate()">テンプレート保存</button>
            <button type="button" class="btn btn-light" onclick="resetForm()">リセット</button>
          </div>
        </form>
      </div>
    </div>

    <div class="tab-pane fade" id="tab-templates">
      <div class="card p-3">
        <h6 class="fw-bold mb-3">保存済みテンプレート一覧</h6>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead class="table-light"><tr><th>名前</th><th>内容</th><th>操作</th></tr></thead>
            <tbody id="templateListBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="tab-channels">
      <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3 text-secondary">新しいWebhookの追加</h6>
        <div class="row g-2 mb-3">
          <div class="col-md-6"><input type="text" class="form-control" id="srvN" placeholder="サーバー名"></div>
          <div class="col-md-6"><input type="text" class="form-control" id="chlN" placeholder="チャンネル名"></div>
          <div class="col-12"><input type="text" class="form-control" id="webU" placeholder="Discord Webhook URL"></div>
        </div>
        <button class="btn btn-primary w-100" onclick="saveWebhook()">Webhookを保存</button>
      </div>
      <div class="card p-3">
        <h6 class="fw-bold mb-3 text-secondary">登録済み一覧</h6>
        <div class="table-responsive"><table class="table table-sm align-middle"><tbody id="channelListBody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  window.onload = () => { loadChannels(); loadReminders(); loadTemplates(); };

  function toggleFormMode() {
    const type = document.getElementById('scheduleType').value;
    document.getElementById('weeklyBox').classList.toggle('hidden', type !== 'weekly');
    document.getElementById('startDateTime').type = (type === 'weekly') ? 'time' : 'datetime-local';
  }

  function loadChannels() {
    google.script.run.withSuccessHandler(list => {
      const select = document.getElementById('targetChannel');
      const tbody = document.getElementById('channelListBody');
      select.innerHTML = '<option value="">選択してください...</option>';
      tbody.innerHTML = list.map(c => `<tr><td class="small fw-bold">${c.label}</td><td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="delChannel(${c.rowIndex})">削除</button></td></tr>`).join('');
      list.forEach(c => select.add(new Option(c.label, c.url)));
    }).getChannels();
  }

  function loadReminders() {
    const b = document.getElementById('reminderListBody');
    google.script.run.withSuccessHandler(list => {
      b.innerHTML = list.length ? list.map(r => `
        <tr>
          <td><span class="badge badge-${r.status}" onclick="toggleSt(${r.rowIndex}, '${r.status}')">${r.status}</span></td>
          <td><div class="fw-bold small">${r.channel}</div><div class="text-muted small">${r.content}</div></td>
          <td><div class="small">${r.nextRun}</div><span class="badge bg-light text-dark border" style="font-size:0.7rem">${r.type}</span></td>
          <td><div class="btn-group"><button class="btn btn-sm btn-outline-primary" onclick='editRem(${JSON.stringify(r).replace(/'/g, "&apos;")})'>編集</button>
          <button class="btn btn-sm btn-outline-danger" onclick="delRem(${r.rowIndex})">削除</button></div></td>
        </tr>`).join('') : '<tr><td colspan="4" class="text-center p-5">予約なし</td></tr>';
    }).getReminders();
  }

  function loadTemplates() {
    google.script.run.withSuccessHandler(list => {
      const s = document.getElementById('templateSelect');
      const b = document.getElementById('templateListBody');
      s.innerHTML = '<option value="">選択してください...</option>';
      b.innerHTML = list.map(t => `<tr><td><div class="small fw-bold">${t.name}</div></td><td><div class="small text-truncate" style="max-width:300px;">${t.content}</div></td><td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="delTemplate(${t.rowIndex})">削除</button></td></tr>`).join('');
      list.forEach(t => s.add(new Option(t.name, JSON.stringify(t))));
    }).getTemplates();
  }

  function applyTemplate() {
    const val = document.getElementById('templateSelect').value;
    if(!val) return;
    const t = JSON.parse(val);
    document.getElementById('content').value = t.content;
    document.getElementById('scheduleType').value = t.type;
    toggleFormMode();
    if(t.type === 'weekly') {
      document.querySelectorAll('.day-cb').forEach(cb => cb.checked = t.days.includes(parseInt(cb.value)));
    }
  }

  function promptSaveTemplate() {
    const name = prompt("テンプレート名を入力してください");
    if(!name) return;
    const data = { name: name, content: document.getElementById('content').value, type: document.getElementById('scheduleType').value, days: Array.from(document.querySelectorAll('.day-cb:checked')).map(c => parseInt(c.value)) };
    google.script.run.withSuccessHandler(m => { alert(m); loadTemplates(); }).saveTemplate(data);
  }

  function saveData() {
    const s = document.getElementById('targetChannel');
    const type = document.getElementById('scheduleType').value;
    let dt = document.getElementById('startDateTime').value;
    if(type === 'weekly') dt = new Date().toISOString().split('T')[0] + 'T' + dt;
    const d = { editRowIndex: document.getElementById('editRowIndex').value, channelName: s.options[s.selectedIndex].text, webhookUrl: s.value, message: document.getElementById('content').value, type: type, datetime: dt, days: Array.from(document.querySelectorAll('.day-cb:checked')).map(c => parseInt(c.value)) };
    google.script.run.withSuccessHandler(() => { resetForm(); loadReminders(); }).saveReminder(d);
  }

  function editRem(r) {
    document.getElementById('editRowIndex').value = r.rowIndex;
    document.getElementById('formTitle').innerText = "リマインダーを編集";
    document.getElementById('targetChannel').value = r.webhookUrl;
    document.getElementById('content').value = r.content;
    document.getElementById('scheduleType').value = r.type;
    toggleFormMode();
    if(r.type === 'weekly') {
      document.getElementById('startDateTime').value = r.nextRun.split(' ')[1];
      document.querySelectorAll('.day-cb').forEach(cb => cb.checked = r.days.includes(parseInt(cb.value)));
    } else {
      document.getElementById('startDateTime').value = r.nextRun.replace(/\//g, '-').replace(' ', 'T');
    }
    bootstrap.Tab.getOrCreateInstance(document.getElementById('create-tab-btn')).show();
  }

  function resetForm() {
    document.getElementById('reminderForm').reset();
    document.getElementById('editRowIndex').value = "";
    document.getElementById('formTitle').innerText = "新規リマインダー作成";
    toggleFormMode();
    bootstrap.Tab.getOrCreateInstance(document.querySelector('[data-bs-target="#tab-list"]')).show();
  }

  function toggleSt(idx, cur) { google.script.run.withSuccessHandler(() => loadReminders()).toggleStatus(idx, cur); }
  function delRem(idx) { if(confirm("削除？")) google.script.run.withSuccessHandler(() => loadReminders()).deleteReminder(idx); }
  function delTemplate(idx) { if(confirm("テンプレート削除？")) google.script.run.withSuccessHandler(() => loadTemplates()).deleteTemplate(idx); }
  function saveWebhook() {
    const d = { serverName: document.getElementById('srvN').value, channelName: document.getElementById('chlN').value, webhookUrl: document.getElementById('webU').value };
    google.script.run.withSuccessHandler(() => { loadChannels(); document.getElementById('webU').value=''; }).saveChannel(d);
  }
  function delChannel(idx) { if(confirm("Webhook削除？")) google.script.run.withSuccessHandler(() => loadChannels()).deleteChannel(idx); }
</script>
</body>
</html>
